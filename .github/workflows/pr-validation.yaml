name: PR Validation

on:
  pull_request:
    branches: [develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
      - run: npm ci
      - name: Lint HTML
        run: npx htmlhint "src/**/*.html"
      - name: Lint CSS
        run: npx stylelint "**/*.css"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Install Parcel
        run: npm install --save-dev parcel
      - name: Build website
        run: npx parcel build src/index.html
